name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.2.3) — required for manual runs'
        required: true

# Cancel any in-progress runs for the same ref
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ── Resolve version/tag from trigger context ───────────────────
  # workflow_dispatch → uses inputs.version (e.g. "1.2.3" → tag "v1.2.3")
  # push tag         → uses the pushed tag (e.g. "v1.2.3")
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"  # strip leading v if provided
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi

  # ── macOS Apple Silicon ──────────────────────────────────────────
  build-macos-arm64:
    needs: resolve-version
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Pandoc (arm64)
        run: npm run download-pandoc

      - name: Verify icons exist
        run: |
          test -f assets/icon.png || { echo "Missing icon.png"; exit 1; }
          test -f assets/icon.icns || { echo "Missing icon.icns"; exit 1; }

      - name: Build installers
        run: node scripts/ci-build.js --version=${{ needs.resolve-version.outputs.version }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - uses: actions/upload-artifact@v4
        with:
          name: installers-darwin-arm64
          path: dist-installers/*
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────────────
  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Pandoc
        run: npm run download-pandoc

      - name: Verify icons exist
        run: |
          if (!(Test-Path "assets/icon.png")) { Write-Error "Missing icon.png"; exit 1 }
          if (!(Test-Path "assets/icon.ico")) { Write-Error "Missing icon.ico"; exit 1 }

      - name: Build installers
        run: node scripts/ci-build.js --version=${{ needs.resolve-version.outputs.version }}
        env:
          WINDOWS_CERTIFICATE_FILE: ${{ secrets.WINDOWS_CERTIFICATE_FILE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

      - uses: actions/upload-artifact@v4
        with:
          name: installers-win32-x64
          path: dist-installers/*
          if-no-files-found: error

  # ── Linux x64 ───────────────────────────────────────────────────
  build-linux-x64:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm

      - name: Install dependencies
        run: npm ci

      - name: Download Pandoc
        run: npm run download-pandoc

      - name: Build installers
        run: node scripts/ci-build.js --version=${{ needs.resolve-version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: installers-linux-x64
          path: dist-installers/*
          if-no-files-found: error

  # ── Linux arm64 ─────────────────────────────────────────────────
  build-linux-arm64:
    needs: resolve-version
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg fakeroot rpm

      - name: Install dependencies
        run: npm ci

      - name: Download Pandoc
        run: npm run download-pandoc

      - name: Build installers
        run: node scripts/ci-build.js --version=${{ needs.resolve-version.outputs.version }}

      - uses: actions/upload-artifact@v4
        with:
          name: installers-linux-arm64
          path: dist-installers/*
          if-no-files-found: error

  # ── Create GitHub Release ───────────────────────────────────────
  release:
    needs:
      - resolve-version
      - build-macos-arm64
      - build-windows
      - build-linux-x64
      - build-linux-arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Create the tag if it doesn't exist (workflow_dispatch case)
      - name: Ensure tag exists
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: all-artifacts/
          merge-multiple: false

      - name: Collect all installers
        run: |
          mkdir -p release-files
          find all-artifacts -type f \( \
            -name "*.dmg" -o -name "*.zip" -o -name "*.exe" \
            -o -name "*.deb" -o -name "*.rpm" \
            -o -name "*.sha256" -o -name "CHECKSUMS.txt" \
            -o -name "*.nupkg" \
          \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Merge checksums
        run: |
          cd release-files
          # Combine all CHECKSUMS.txt from sub-artifacts
          > CHECKSUMS-all.txt
          for f in $(find . -name "CHECKSUMS.txt" -not -name "CHECKSUMS-all.txt"); do
            cat "$f" >> CHECKSUMS-all.txt
          done
          # Also combine all .sha256 files
          for f in *.sha256; do
            [ -f "$f" ] && cat "$f" >> CHECKSUMS-all.txt
          done
          sort -u -o CHECKSUMS-all.txt CHECKSUMS-all.txt
          mv CHECKSUMS-all.txt CHECKSUMS.txt
          # Remove individual sha256 files from release (keep only aggregated)
          rm -f *.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.tag }}
          name: Novel Engine ${{ needs.resolve-version.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: release-files/*
          body: |
            ## Installation

            | Platform | File | Architecture |
            |----------|------|--------------|
            | **macOS** (Apple Silicon) | `Novel-Engine-*-darwin-arm64.dmg` | ARM64 |
            | **Windows** | `Novel-Engine-*-win32-x64.exe` | x86_64 |
            | **Linux** (Debian/Ubuntu) | `Novel-Engine-*-linux-x64.deb` | x86_64 |
            | **Linux** (Fedora/RHEL) | `Novel-Engine-*-linux-x64.rpm` | x86_64 |
            | **Linux ARM** (Debian/Ubuntu) | `Novel-Engine-*-linux-arm64.deb` | ARM64 |
            | **Linux ARM** (Fedora/RHEL) | `Novel-Engine-*-linux-arm64.rpm` | ARM64 |

            ### Prerequisites
            - [Claude Code CLI](https://docs.anthropic.com/en/docs/claude-code) installed and authenticated

            ### Verify Downloads
            ```bash
            sha256sum -c CHECKSUMS.txt
            ```
